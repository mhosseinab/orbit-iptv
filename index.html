<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- ================= Primary SEO ================= -->
    <title>Orbit IPTV — Watch 12,500+ Free Live TV Channels Online</title>
    <meta
      name="description"
      content="Watch 12,500+ free live TV channels from 100+ countries in your browser. Filter by category, country & language with geo-block detection. No signup."
    />
    <link rel="canonical" href="https://orbit-iptv.pages.dev/" />
    <meta name="robots" content="index, follow, max-image-preview:large, max-snippet:-1" />
    <meta
      name="keywords"
      content="free IPTV, live TV online, watch TV in browser, m3u player, iptv-org playlist, free live TV channels, online TV streaming, HLS player"
    />
    <meta name="theme-color" content="#0a0c12" />
    <meta name="author" content="Orbit IPTV" />
    <meta name="application-name" content="Orbit IPTV" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="Orbit IPTV" />
    <link
      rel="icon"
      href="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%2032%2032'%3E%3Crect%20width='32'%20height='32'%20rx='8'%20fill='%236d8bff'/%3E%3Cpath%20d='M13%2010l9%206-9%206z'%20fill='%230b1020'/%3E%3C/svg%3E"
    />

    <!-- ================= Open Graph ================= -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Orbit IPTV" />
    <meta property="og:title" content="Orbit IPTV — Watch 12,500+ Free Live TV Channels Online" />
    <meta
      property="og:description"
      content="Stream 12,500+ free live TV channels from 100+ countries in your browser. Search, filter by category & country, with geo-block detection. No signup."
    />
    <meta property="og:url" content="https://orbit-iptv.pages.dev/" />
    <meta property="og:image" content="https://orbit-iptv.pages.dev/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="Orbit IPTV — 12,500+ live TV channels from 100+ countries" />
    <meta property="og:locale" content="en_US" />

    <!-- ================= Twitter ================= -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Orbit IPTV — Watch 12,500+ Free Live TV Channels Online" />
    <meta
      name="twitter:description"
      content="Stream 12,500+ free live TV channels from 100+ countries in your browser. Search, filter, geo-block detection. No signup."
    />
    <meta name="twitter:image" content="https://orbit-iptv.pages.dev/og-image.png" />
    <meta name="twitter:image:alt" content="Orbit IPTV — 12,500+ live TV channels" />

    <!-- ================= Performance hints ================= -->
    <link rel="preconnect" href="https://iptv-org.github.io" crossorigin />
    <link rel="dns-prefetch" href="https://iptv-org.github.io" />

    <!-- ================= Structured data: WebApplication ================= -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebApplication",
        "name": "Orbit IPTV",
        "alternateName": "Orbit IPTV Player",
        "url": "https://orbit-iptv.pages.dev/",
        "description": "Free web player for watching 12,500+ live TV channels from more than 100 countries, with search, category/country/language filters and geo-block detection.",
        "applicationCategory": "MultimediaApplication",
        "operatingSystem": "Any (web browser)",
        "browserRequirements": "Requires JavaScript and HLS / Media Source Extensions",
        "offers": { "@type": "Offer", "price": "0", "priceCurrency": "USD" },
        "isAccessibleForFree": true,
        "inLanguage": "en",
        "featureList": [
          "12,500+ free live TV channels",
          "Full-text channel search",
          "Filter by category, country and language",
          "Geo-blocked and header-restricted stream detection",
          "Favorites and recently played",
          "Picture-in-picture and fullscreen",
          "Works on desktop and mobile"
        ]
      }
    </script>

    <!-- ================= Structured data: FAQ ================= -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "FAQPage",
        "mainEntity": [
          {
            "@type": "Question",
            "name": "Is Orbit IPTV free to use?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Yes. Orbit IPTV is completely free. There is no signup, subscription or app to install — it runs entirely in your web browser."
            }
          },
          {
            "@type": "Question",
            "name": "What channels can I watch on Orbit IPTV?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Orbit IPTV streams more than 12,500 free, publicly available live TV channels from over 100 countries, aggregated by the open-source iptv-org project. Channels are organised by category — news, sports, movies, music, kids and more — as well as by country and language."
            }
          },
          {
            "@type": "Question",
            "name": "Why won't some live TV channels play?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Some streams are geo-blocked, require special request headers, or do not send the cross-origin (CORS) headers browsers need. Orbit IPTV labels these in advance and, on supported deployments, automatically retries them through a built-in proxy."
            }
          },
          {
            "@type": "Question",
            "name": "What does a geo-blocked channel mean?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "A geo-blocked channel is a live stream the broadcaster restricts to viewers in a specific country or region. Orbit IPTV flags geo-blocked streams using data from iptv-org so you know before you click."
            }
          },
          {
            "@type": "Question",
            "name": "Do I need to install anything to watch live TV?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "No. Orbit IPTV is a single web page. Open it in any modern browser such as Chrome, Edge, Firefox or Safari and start watching. Safari plays the widest range of streams because it supports HLS natively."
            }
          },
          {
            "@type": "Question",
            "name": "Is Orbit IPTV legal?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Orbit IPTV hosts no video itself. It only links to publicly available streams aggregated by the iptv-org community project. The availability and licensing of each stream are the responsibility of the original broadcaster."
            }
          }
        ]
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <noscript>
      <div style="max-width: 40rem; margin: 4rem auto; padding: 0 1.5rem; font-family: system-ui, sans-serif; color: #e6e9f2; line-height: 1.6">
        <h1>Orbit IPTV — Free Live TV in Your Browser</h1>
        <p>
          Orbit IPTV is a free web player for 12,500+ live TV channels from over 100 countries,
          aggregated by the open-source iptv-org project. Search and filter by category, country and
          language, with geo-block detection — no signup, nothing to install.
        </p>
        <p><strong>JavaScript is required to browse and play channels.</strong> Please enable JavaScript and reload.</p>
      </div>
    </noscript>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
