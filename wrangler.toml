name = "orbit-iptv"
compatibility_date = "2024-11-01"
pages_build_output_dir = "."

# Functions live in ./functions and are auto-detected (no build step).

[vars]
# Master switch for the on-demand stream proxy (functions/proxy.js).
#   "1" or unset = proxy ON  (blocked streams auto-retry through it)
#   "0"          = proxy OFF (the player detects this and runs direct-only)
# Can also be overridden per-environment in the Pages dashboard without redeploying.
PROXY_ENABLED = "1"

# Allow other websites to call the proxy (turns it into an open proxy).
# Keep "0" on public deploys to block cross-site abuse. "1" disables the check.
PROXY_ALLOW_CROSS_SITE = "0"
